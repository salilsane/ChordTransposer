<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chord Transposer</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load React -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Load Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- SVG Icons to replace lucide-react imports ---
        const Settings2 = ({ className }) => (
            <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="7" r="3"/><circle cx="7" cy="17" r="3"/></svg>
        );
        const Music = ({ className }) => (
            <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        );
        const Hash = ({ className }) => (
            <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="9" y2="9"/><line x1="4" x2="20" y1="15" y2="15"/><line x1="10" x2="8" y1="3" y2="21"/><line x1="16" x2="14" y1="3" y2="21"/></svg>
        );
        const RefreshCcw = ({ className }) => (
            <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21v-5h5"/></svg>
        );

        const NOTES_SHARP = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const NOTES_FLAT = ['C', 'Db', 'D', 'Eb', 'E', 'F', 'Gb', 'G', 'Ab', 'A', 'Bb', 'B'];

        // Generate exactly 2 octaves (24 keys) mapping white keys and their corresponding right-side black keys
        const generatePianoKeys = () => {
            const whiteKeys = [];
            let absIndex = 0;
            for (let octave = 0; octave < 2; octave++) {
                const sequence = [
                    { name: 'C', hasBlack: true },
                    { name: 'D', hasBlack: true },
                    { name: 'E', hasBlack: false },
                    { name: 'F', hasBlack: true },
                    { name: 'G', hasBlack: true },
                    { name: 'A', hasBlack: true },
                    { name: 'B', hasBlack: false },
                ];
                
                for (let note of sequence) {
                    whiteKeys.push({ ...note, absIndex });
                    absIndex += note.hasBlack ? 2 : 1;
                }
            }
            return whiteKeys;
        };

        const PIANO_KEYS = generatePianoKeys();

        function App() {
            const [inputs, setInputs] = useState(['F#', 'C', 'Am', '', '', '']);
            const [transpose, setTranspose] = useState(1);
            const [useFlats, setUseFlats] = useState(false);
            const [activeChordIndex, setActiveChordIndex] = useState(0);
            const [activeNotes, setActiveNotes] = useState([]);

            const parseChord = (chord) => {
                if (!chord) return null;
                const match = chord.trim().match(/^([A-G][b#]?)(.*)$/i);
                if (!match) return null;

                let root = match[1];
                root = root.charAt(0).toUpperCase() + root.slice(1).toLowerCase();
                
                let rootIndex = NOTES_SHARP.indexOf(root);
                if (rootIndex === -1) rootIndex = NOTES_FLAT.indexOf(root);
                if (rootIndex === -1) return null;

                return { rootIndex, quality: match[2] };
            };

            const getIntervals = (quality) => {
                const q = quality.trim();
                if (['m', 'min', '-'].includes(q)) return [0, 3, 7];
                if (['M', 'maj', 'Maj'].includes(q)) return [0, 4, 7];
                if (['dim', '°'].includes(q)) return [0, 3, 6];
                if (['aug', '+'].includes(q)) return [0, 4, 8];
                if (['sus2'].includes(q)) return [0, 2, 7];
                if (['sus4', 'sus'].includes(q)) return [0, 5, 7];
                if (['7'].includes(q)) return [0, 4, 7, 10];
                if (['maj7', 'M7'].includes(q)) return [0, 4, 7, 11];
                if (['m7', 'min7'].includes(q)) return [0, 3, 7, 10];
                if (['m7b5', 'ø'].includes(q)) return [0, 3, 6, 10];
                if (['dim7'].includes(q)) return [0, 3, 6, 9];
                return [0, 4, 7]; 
            };

            const transposeStr = (chord, amount) => {
                const parsed = parseChord(chord);
                if (!parsed) return ""; 
                
                let newIndex = (parsed.rootIndex + amount) % 12;
                if (newIndex < 0) newIndex += 12;
                
                const newRoot = useFlats ? NOTES_FLAT[newIndex] : NOTES_SHARP[newIndex];
                return newRoot + parsed.quality;
            };

            useEffect(() => {
                if (activeChordIndex === null) {
                    setActiveNotes([]);
                    return;
                }

                const currentChord = inputs[activeChordIndex];
                if (!currentChord) {
                    setActiveNotes([]);
                    return;
                }

                const transposed = transposeStr(currentChord, transpose);
                const parsed = parseChord(transposed);
                
                if (!parsed) {
                    setActiveNotes([]);
                    return;
                }

                const intervals = getIntervals(parsed.quality);
                const notes = intervals.map(interval => parsed.rootIndex + interval);
                setActiveNotes(notes);
            }, [inputs, transpose, useFlats, activeChordIndex]);

            const handleInputChange = (index, value) => {
                const newInputs = [...inputs];
                newInputs[index] = value;
                setInputs(newInputs);
            };

            const handleReset = () => {
                setInputs(['', '', '', '', '', '']);
                setTranspose(0);
                setActiveChordIndex(null);
            };

            return (
                <div className="min-h-screen bg-neutral-100 p-2 sm:p-4 md:p-8 font-sans text-neutral-800 flex justify-center items-start">
                    <div className="bg-white rounded-2xl shadow-xl w-full max-w-4xl overflow-hidden border border-neutral-200">
                        
                        <div className="bg-neutral-900 text-white p-6 flex flex-col md:flex-row justify-between items-center gap-4 text-center md:text-left">
                            <div className="flex flex-col items-center md:items-start gap-1">
                                <div className="flex items-center justify-center md:justify-start gap-3">
                                    <Music className="w-6 h-6 shrink-0 text-blue-400" />
                                    <div className="flex items-center gap-3">
                                        <h1 className="text-2xl font-bold tracking-tight">Chord Transposer</h1>
                                        <span className="bg-neutral-800 text-neutral-400 text-xs px-2 py-1 rounded border border-neutral-700 uppercase tracking-wider font-semibold hidden sm:inline-block">Version 1</span>
                                    </div>
                                </div>
                                <div className="text-blue-400 text-xs sm:text-sm font-medium md:ml-9">
                                    Developed by : Salil Sane &copy; 2026
                                </div>
                            </div>
                            <button 
                                onClick={handleReset}
                                className="text-neutral-400 hover:text-white flex items-center gap-2 text-sm transition-colors mt-2 md:mt-0"
                            >
                                <RefreshCcw className="w-4 h-4" /> Reset
                            </button>
                        </div>

                        <div className="p-4 md:p-8 space-y-8 md:space-y-10">
                            
                            <div className="flex flex-col md:flex-row gap-8 items-start md:items-center bg-neutral-50 p-6 rounded-xl border border-neutral-200">
                                <div className="flex-1 w-full space-y-3">
                                    <div className="flex justify-between items-center">
                                        <label className="font-semibold text-neutral-700 flex items-center gap-2">
                                            <Settings2 className="w-4 h-4" /> Transpose Amount
                                        </label>
                                        <span className="font-mono bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm font-bold">
                                            {transpose > 0 ? `+${transpose}` : transpose}
                                        </span>
                                    </div>
                                    <input 
                                        type="range" 
                                        min="-12" 
                                        max="12" 
                                        value={transpose} 
                                        onChange={(e) => setTranspose(parseInt(e.target.value))}
                                        className="w-full h-2 bg-neutral-300 rounded-lg appearance-none cursor-pointer accent-blue-600"
                                    />
                                    <div className="flex justify-between text-xs text-neutral-400 font-mono">
                                        <span>-12</span>
                                        <span>0</span>
                                        <span>+12</span>
                                    </div>
                                </div>

                                <div className="w-px h-16 bg-neutral-200 hidden md:block"></div>

                                <div className="space-y-3">
                                    <label className="font-semibold text-neutral-700 flex items-center gap-2">
                                        <Hash className="w-4 h-4" /> Notation Preference
                                    </label>
                                    <div className="flex bg-neutral-200 rounded-lg p-1">
                                        <button 
                                            onClick={() => setUseFlats(false)}
                                            className={`flex-1 px-4 py-1.5 rounded-md text-sm font-medium transition-colors ${!useFlats ? 'bg-white shadow text-neutral-900' : 'text-neutral-500 hover:text-neutral-700'}`}
                                        >
                                            Sharps (#)
                                        </button>
                                        <button 
                                            onClick={() => setUseFlats(true)}
                                            className={`flex-1 px-4 py-1.5 rounded-md text-sm font-medium transition-colors ${useFlats ? 'bg-white shadow text-neutral-900' : 'text-neutral-500 hover:text-neutral-700'}`}
                                        >
                                            Flats (b)
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div className="space-y-6">
                                <div>
                                    <h3 className="text-sm font-bold text-neutral-400 uppercase tracking-wider mb-3">1. Enter Original Chords</h3>
                                    <div className="grid grid-cols-3 md:grid-cols-6 gap-2 sm:gap-3">
                                        {inputs.map((val, idx) => (
                                            <input
                                                key={`input-${idx}`}
                                                type="text"
                                                value={val}
                                                onChange={(e) => handleInputChange(idx, e.target.value)}
                                                placeholder={`Chord ${idx + 1}`}
                                                className="w-full p-2 sm:p-3 text-center text-base sm:text-lg font-semibold border border-neutral-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all placeholder-neutral-300"
                                            />
                                        ))}
                                    </div>
                                </div>

                                <div>
                                    <h3 className="text-sm font-bold text-neutral-400 uppercase tracking-wider mb-3 flex items-center justify-between">
                                        <span>2. Transposed Results</span>
                                        <span className="text-xs normal-case text-blue-500 font-normal">Click a chord to view on piano</span>
                                    </h3>
                                    <div className="grid grid-cols-3 md:grid-cols-6 gap-2 sm:gap-3">
                                        {inputs.map((val, idx) => {
                                            const transposed = transposeStr(val, transpose);
                                            const isActive = activeChordIndex === idx && transposed;
                                            
                                            return (
                                                <button
                                                    key={`output-${idx}`}
                                                    onClick={() => transposed && setActiveChordIndex(idx)}
                                                    disabled={!transposed}
                                                    className={`
                                                        p-2 sm:p-3 text-center text-lg sm:text-xl font-bold rounded-lg border-2 transition-all min-h-[50px] sm:min-h-[60px]
                                                        ${!transposed ? 'bg-neutral-50 border-neutral-100 text-neutral-300 cursor-not-allowed' : ''}
                                                        ${transposed && !isActive ? 'bg-white border-neutral-200 text-neutral-800 hover:border-blue-300 hover:shadow-md cursor-pointer' : ''}
                                                        ${isActive ? 'bg-blue-50 border-blue-500 text-blue-700 shadow-sm ring-4 ring-blue-500/10' : ''}
                                                    `}
                                                >
                                                    {transposed || "-"}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>

                            <div className="pt-6 border-t border-neutral-200">
                                <div className="flex flex-col items-center">
                                    <p className="text-sm text-neutral-500 mb-6 font-medium">
                                        {activeNotes.length > 0 ? (
                                           <>Showing notes for <strong className="text-blue-600 px-1">{transposeStr(inputs[activeChordIndex], transpose)}</strong></>
                                        ) : (
                                            "Select a valid transposed chord above to see it on the piano"
                                        )}
                                    </p>

                                    <div className="relative flex justify-center bg-neutral-900 p-2 rounded-xl shadow-inner w-full max-w-[640px] overflow-x-auto">
                                        <div className="flex relative">
                                            {PIANO_KEYS.map((keyInfo, i) => {
                                                const isActiveWhite = activeNotes.includes(keyInfo.absIndex);
                                                const blackKeyIndex = keyInfo.absIndex + 1;
                                                const isActiveBlack = keyInfo.hasBlack && activeNotes.includes(blackKeyIndex);

                                                return (
                                                    <div key={`white-${i}`} className="relative">
                                                        <div 
                                                            className={`
                                                                w-10 sm:w-12 h-36 sm:h-44 border-r border-b border-l border-neutral-300 rounded-b-md mx-[0.5px] relative transition-colors duration-200
                                                                ${isActiveWhite ? 'bg-blue-50' : 'bg-white'}
                                                            `}
                                                        >
                                                            {isActiveWhite && (
                                                                <div className="absolute bottom-4 left-1/2 -translate-x-1/2 w-4 h-4 bg-red-500 rounded-full shadow-[0_0_8px_rgba(239,68,68,0.6)]"></div>
                                                            )}
                                                        </div>

                                                        {keyInfo.hasBlack && (
                                                            <div 
                                                                className="absolute top-0 -right-3 sm:-right-4 w-6 sm:w-8 h-24 sm:h-28 bg-neutral-900 rounded-b border border-black z-10 flex justify-center"
                                                            >
                                                                <div className="absolute top-0 w-full h-full bg-gradient-to-b from-neutral-700/40 to-transparent rounded-b pointer-events-none"></div>
                                                                
                                                                {isActiveBlack && (
                                                                    <div className="absolute bottom-3 w-3 h-3 bg-red-500 rounded-full shadow-[0_0_8px_rgba(239,68,68,0.6)] z-20"></div>
                                                                )}
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                    
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
